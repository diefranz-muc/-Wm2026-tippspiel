  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

  header{background:linear-gradient(135deg,#0e1117 0%,#1a0a0a 50%,#0e1117 100%);border-bottom:2px solid var(--accent);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;letter-spacing:.02em;line-height:1;}
  .header-title span{color:var(--accent2);}
  .header-meta{color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:4px;}

  .players-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .players-bar label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
  .player-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;transition:border-color .15s;}
  .player-chip.active{border-color:var(--accent);background:rgba(192,57,43,.15);}
  .player-chip .dot{width:8px;height:8px;border-radius:50%;}
  .player-chip .remove{color:var(--muted);margin-left:4px;font-size:11px;cursor:pointer;}
  .player-chip .remove:hover{color:var(--accent2);}
  .add-player{background:none;border:1px dashed var(--border);border-radius:20px;padding:4px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .15s,color .15s;}
  .add-player:hover{border-color:var(--accent);color:var(--text);}
  .scoreboard-btn{margin-left:auto;background:var(--accent);border:none;border-radius:6px;padding:6px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
  .scoreboard-btn:hover{background:var(--accent2);}

  main{padding:20px 28px;max-width:1300px;}
  .phase-header{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:24px 0 10px;display:flex;align-items:center;gap:10px;}
  .phase-header::after{content:'';flex:1;height:1px;background:var(--border);}
  .games-grid{display:grid;gap:6px;}

  .game-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:grid;grid-template-columns:88px 1fr 110px 1fr 88px 1fr;align-items:stretch;overflow:hidden;transition:border-color .15s;}
  .game-row:hover{border-color:#3a4565;}
  .germany-row{border-color:#b8860b;background:rgba(240,180,41,.04);}
  .germany-row:hover{border-color:var(--gold);}

  .game-date{padding:10px 10px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
  .game-date .day{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .game-date .time{font-weight:700;font-size:15px;color:var(--text);}

  .team{padding:8px 12px;display:flex;align-items:center;gap:8px;}
  .team.right{flex-direction:row-reverse;text-align:right;}
  .team-flag{font-size:18px;flex-shrink:0;}
  .team-name-input{background:none;border:none;border-bottom:1px dashed transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;width:100%;padding:2px 4px;outline:none;cursor:text;}
  .team-name-input:focus{border-bottom-color:var(--accent);}
  .team-name-input::placeholder{color:var(--muted);}

  .score-block{padding:8px;border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .score-inputs{display:flex;align-items:center;gap:4px;}
  .score-input{width:30px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;font-weight:700;text-align:center;outline:none;font-family:'Inter',sans-serif;}
  .score-input:focus{border-color:var(--accent);}
  .score-sep{color:var(--muted);font-weight:700;font-size:14px;}
  .score-label{font-size:9px;color:var(--muted);}

  .tv-cell{padding:6px 8px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;}
  .tv-badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
  .tv-ard{background:var(--ard);color:#fff;}
  .tv-zdf{background:var(--zdf);color:#fff;}
  .tv-magenta{background:var(--magenta);color:#fff;}
  .tv-open{background:var(--open);color:#ccd;font-style:italic;}
  .tv-confirmed{font-size:8px;color:var(--green);}
  .tv-unconfirmed{font-size:8px;color:var(--muted);}

  .tips-cell{padding:6px 10px;display:flex;flex-direction:column;gap:5px;justify-content:center;}
  .tip-row{display:flex;align-items:center;gap:6px;}
  .tip-player-info{display:flex;align-items:center;gap:4px;min-width:72px;}
  .tip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .tip-name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62px;}
  .tip-inputs{display:flex;align-items:center;gap:3px;}
  .tip-input{width:24px;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:12px;font-weight:600;text-align:center;outline:none;font-family:'Inter',sans-serif;}
  .tip-input:focus{border-color:var(--gold);}
  .tip-sep{color:var(--muted);font-size:11px;}
  .tip-pts{font-size:10px;font-weight:700;min-width:18px;text-align:right;}
  .pts3{color:var(--gold);}
  .pts2{color:var(--green);}
  .pts1{color:#5b8dee;}
  .pts0{color:var(--muted);}

  .ko-note{background:var(--surface);border:1px dashed var(--border);border-radius:6px;padding:8px 12px;color:var(--muted);font-size:12px;margin-bottom:6px;}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:360px;max-width:95vw;}
  .modal h3{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;margin-bottom:14px;color:var(--gold);}
  .modal input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
  .modal input[type=text]:focus{border-color:var(--accent);}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
  .btn{background:var(--accent);border:none;border-radius:6px;padding:8px 16px;color:#fff;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;}
  .btn:hover{background:var(--accent2);}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
  .btn-ghost:hover{border-color:var(--text);color:var(--text);}

  .sb-table{width:100%;border-collapse:collapse;margin-top:10px;}
  .sb-table th{text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);}
  .sb-table td{padding:9px 10px;border-bottom:1px solid var(--border);}
  .sb-table tr:last-child td{border-bottom:none;}

  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px 28px;border-top:1px solid var(--border);margin-top:20px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:2px;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}

  .sync-indicator{font-size:10px;color:var(--muted);margin-left:auto;padding-right:4px;}
  .sync-indicator.syncing{color:var(--gold);}
  .sync-indicator.ok{color:var(--green);}

  @media(max-width:800px){
    main{padding:12px 14px;}
    header,. players-bar{padding-left:14px;padding-right:14px;}
    .game-row{grid-template-columns:1fr!important;}
    .game-row>*{border-right:none!important;border-bottom:1px solid var(--border);}
    .game-row>*:last-child{border-bottom:none;}
    .team.right{flex-direction:row;}
  }
</style>
</head>

  {id:'a02',phase:'achtel',date:'Anfang Juli',time:'TBD',home:'Sieger S3',away:'Sieger S4',tv:{s:'open',c:false},de:false},
  {id:'a03',phase:'achtel',date:'Anfang Juli',time:'TBD',home:'Sieger S5',away:'Sieger S6',tv:{s:'open',c:false},de:false},
  {id:'a04',phase:'achtel',date:'Anfang Juli',time:'TBD',home:'Sieger S7',away:'Sieger S8',tv:{s:'open',c:false},de:false},
  // Viertelfinale
  {id:'v01',phase:'viertel',date:'~08.07.',time:'TBD',home:'Sieger A1',away:'Sieger A2',tv:{s:'open',c:false},de:false},
  {id:'v02',phase:'viertel',date:'~09.07.',time:'TBD',home:'Sieger A3',away:'Sieger A4',tv:{s:'open',c:false},de:false},
  // Halbfinale
  {id:'h01',phase:'halbfinale',date:'~14.07.',time:'21:00',home:'Sieger V1',away:'Sieger V2',tv:{s:'open',c:false},de:false},
  {id:'h02',phase:'halbfinale',date:'~15.07.',time:'21:00',home:'Sieger V3',away:'Sieger V4',tv:{s:'open',c:false},de:false},
  // Platz 3
  {id:'p01',phase:'platz3',date:'Sa 18.07.',time:'21:00',home:'Verlierer H1',away:'Verlierer H2',tv:{s:'open',c:false},de:false},
  // Finale
  {id:'f01',phase:'finale',date:'So 19.07.',time:'21:00',home:'Finalist 1',away:'Finalist 2',tv:{s:'zdf',c:true},de:false},
];

// ============================================================
// STATE
// ============================================================
let players = [];
let results = {};  // { gameId: {home,away} }
let tips = {};     // { playerId: { gameId: {home,away} } }
let activePlayer = localStorage.getItem('wm2026_active') || null;
let gameOverrides = JSON.parse(localStorage.getItem('wm2026_overrides')||'{}'); // team name edits

// ============================================================
// SUPABASE HELPERS
// ============================================================
function setSyncing(state){
  const el=document.getElementById('syncIndicator');
  if(state==='syncing'){el.textContent='вЧП speichertвА¶';el.className='sync-indicator syncing';}
  else if(state==='ok'){el.textContent='вЧП live';el.className='sync-indicator ok';setTimeout(()=>{el.textContent='вЧП live';el.className='sync-indicator';},2000);}
  else{el.textContent='вЧП live';el.className='sync-indicator';}
}

async function loadAll(){
  try{
    const [pr,rr,tr]=await Promise.all([
      api.get('/wm_players?order=created_at'),
      api.get('/wm_results'),
      api.get('/wm_tips'),
    ]);
    players=pr.data||[];
    results={};
    (rr.data||[]).forEach(r=>{ results[r.game_id]={home:r.home_score,away:r.away_score}; });
    tips={};
    (tr.data||[]).forEach(t=>{
      if(!tips[t.player_id])tips[t.player_id]={};
      tips[t.player_id][t.game_id]={home:t.home_score,away:t.away_score};
    });
    render();
  }catch(e){
    console.error(e);
    showToast('Verbindungsfehler вАУ bitte neu laden');
  }
}

async function dbAddPlayer(name,color){
  setSyncing('syncing');
  const r=await api.post('/wm_players',{name,color},{headers:{'Prefer':'return=representation'}});
  setSyncing('ok');
  return r.data[0];
}

async function dbDeletePlayer(id){
  setSyncing('syncing');
  await api.delete('/wm_players?id=eq.'+id);
  setSyncing('ok');
}

async function dbSetResult(gameId,home,away){
  setSyncing('syncing');
  await api.post('/wm_results',{game_id:gameId,home_score:home===''?null:parseInt(home),away_score:away===''?null:parseInt(away)},{
    headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}
  });
  setSyncing('ok');
}

async function dbSetTip(playerId,gameId,home,away){
  setSyncing('syncing');
  await api.post('/wm_tips',{
    player_id:playerId,game_id:gameId,
    home_score:home===''||home===undefined?null:parseInt(home),
    away_score:away===''||away===undefined?null:parseInt(away)
  },{headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}});
  setSyncing('ok');
}

// ============================================================
// POINTS
// ============================================================
function calcPoints(gameId,playerId){
  const r=results[gameId];
  const t=(tips[playerId]||{})[gameId];
  if(!r||r.home===null||r.home===undefined)return null;
  if(!t||t.home===null||t.home===undefined)return null;
  const rh=parseInt(r.home),ra=parseInt(r.away),th=parseInt(t.home),ta=parseInt(t.away);
  if(isNaN(rh)||isNaN(ra)||isNaN(th)||isNaN(ta))return null;
  if(rh===th&&ra===ta)return 3;
  if((rh-ra)===(th-ta))return 2;
  const rt=rh>ra?1:rh<ra?-1:0,tt=th>ta?1:th<ta?-1:0;
  if(rt===tt)return 1;
  return 0;
}

function totalPoints(pid){
  return GAMES.reduce((s,g)=>s+(calcPoints(g.id,pid)||0),0);
}

// ============================================================
// RENDER
// ============================================================
function render(){
  renderPlayers();
  renderGames();
}

function renderPlayers(){
  const c=document.getElementById('playerChips');
  c.innerHTML='';
  players.forEach(p=>{
    const chip=document.createElement('div');
    chip.className='player-chip'+(activePlayer===p.id?' active':'');
    chip.innerHTML=`<div class="dot" style="background:${p.color}"></div><span>${p.name}</span><span class="remove" onclick="removePlayer('${p.id}',event)">вЬХ</span>`;
    chip.onclick=(e)=>{if(!e.target.classList.contains('remove'))setActive(p.id);};
    c.appendChild(chip);
  });
}

function renderGames(){
  const main=document.getElementById('mainContent');
  main.innerHTML='';
  PHASES.forEach(ph=>{
    const games=GAMES.filter(g=>g.phase===ph.id);
    if(!games.length)return;
    const hdr=document.createElement('div');
    hdr.className='phase-header';
    hdr.textContent=ph.label;
    main.appendChild(hdr);
    if(['sechzehntel','achtel','viertel'].includes(ph.id)){
      const note=document.createElement('div');
      note.className='ko-note';
      note.textContent='Paarungen stehen nach der Gruppenphase fest вАУ Teamnamen direkt im Feld editierbar.';
      main.appendChild(note);
    }
    const grid=document.createElement('div');
    grid.className='games-grid';
    games.forEach(g=>grid.appendChild(buildRow(g)));
    main.appendChild(grid);
  });
}

function buildRow(game){
  const ovr=gameOverrides[game.id]||{};
  const homeName=ovr.home||game.home;
  const awayName=ovr.away||game.away;
  const result=results[game.id]||{};

  const tvMap={ard:['ARD','tv-ard'],zdf:['ZDF','tv-zdf'],magenta:['MagentaTV','tv-magenta'],open:['?','tv-open']};
  const [tvLabel,tvClass]=tvMap[game.tv.s]||['?','tv-open'];
  const tvSub=game.tv.s==='open'
    ?'<span class="tv-unconfirmed">noch offen</span>'
    :game.tv.c
      ?'<span class="tv-confirmed">вЬУ best√§tigt</span>'
      :'<span class="tv-unconfirmed">wahrscheinlich</span>';

  const row=document.createElement('div');
  row.className='game-row'+(game.de?' germany-row':'');
  row.id='row-'+game.id;
  row.style.gridTemplateColumns='88px 1fr 110px 1fr 88px 1fr';

  // Date
  const dateDiv=document.createElement('div');
  dateDiv.className='game-date';
  dateDiv.innerHTML=`<div class="day">${game.date}</div><div class="time">${game.time}</div>`;
  row.appendChild(dateDiv);

  // Home
  const homeDiv=document.createElement('div');
  homeDiv.className='team';
  homeDiv.innerHTML=`<span class="team-flag">${flag(homeName)}</span><input class="team-name-input" value="${homeName}" placeholder="Heimteam" onchange="overrideName('${game.id}','home',this.value)">`;
  row.appendChild(homeDiv);

  // Score (result)
  const scoreDiv=document.createElement('div');
  scoreDiv.className='score-block';
  scoreDiv.innerHTML=`
    <div class="score-inputs">
      <input class="score-input" type="number" min="0" max="99" value="${result.home??''}" placeholder="-"
        onchange="saveResult('${game.id}','home',this.value)">
      <span class="score-sep">:</span>
      <input class="score-input" type="number" min="0" max="99" value="${result.away??''}" placeholder="-"
        onchange="saveResult('${game.id}','away',this.value)">
    </div>
    <div class="score-label">Ergebnis</div>`;
  row.appendChild(scoreDiv);

  // Away
  const awayDiv=document.createElement('div');
  awayDiv.className='team right';
  awayDiv.innerHTML=`<input class="team-name-input" value="${awayName}" placeholder="Ausw√§rts" onchange="overrideName('${game.id}','away',this.value)"><span class="team-flag">${flag(awayName)}</span>`;
  row.appendChild(awayDiv);

  // TV
  const tvDiv=document.createElement('div');
  tvDiv.className='tv-cell';
  tvDiv.innerHTML=`<span class="tv-badge ${tvClass}">${tvLabel}</span>${tvSub}`;
  row.appendChild(tvDiv);

  // Tips
  const tipsDiv=document.createElement('div');
  tipsDiv.className='tips-cell';
  tipsDiv.style.gridColumn='span 1';
  if(players.length===0){
    tipsDiv.innerHTML='<span style="color:var(--muted);font-size:11px">Auf вАЮMitmachen" klicken вЖС</span>';
  } else {
    players.forEach(p=>{
      const t=(tips[p.id]||{})[game.id]||{};
      const pts=calcPoints(game.id,p.id);
      const ptsHtml=pts!==null?`<span class="tip-pts ${pts===3?'pts3':pts===2?'pts2':pts===1?'pts1':'pts0'}">${pts}P</span>`:'';
      const dim=activePlayer&&activePlayer!==p.id?'opacity:0.35':'';
      const tipRow=document.createElement('div');
      tipRow.className='tip-row';
      tipRow.innerHTML=`
        <div class="tip-player-info">
          <div class="tip-dot" style="background:${p.color}"></div>
          <span class="tip-name">${p.name}</span>
        </div>
        <div class="tip-inputs" style="${dim}">
          <input class="tip-input" type="number" min="0" max="99" value="${t.home??''}" placeholder="-"
            onchange="saveTip('${p.id}','${game.id}','home',this.value)"
            onfocus="setActive('${p.id}')">
          <span class="tip-sep">:</span>
          <input class="tip-input" type="number" min="0" max="99" value="${t.away??''}" placeholder="-"
            onchange="saveTip('${p.id}','${game.id}','away',this.value)"
            onfocus="setActive('${p.id}')">
        </div>
        ${ptsHtml}`;
      tipsDiv.appendChild(tipRow);
    });
  }
  row.appendChild(tipsDiv);
  return row;
}

// ============================================================
// ACTIONS
// ============================================================
function setActive(pid){
  activePlayer=activePlayer===pid?null:pid;
  localStorage.setItem('wm2026_active',activePlayer||'');
  render();
}

function overrideName(gameId,side,val){
  if(!gameOverrides[gameId])gameOverrides[gameId]={};
  gameOverrides[gameId][side]=val;
  localStorage.setItem('wm2026_overrides',JSON.stringify(gameOverrides));
}

async function saveResult(gameId,side,val){
  if(!results[gameId])results[gameId]={};
  results[gameId][side]=val===''?null:parseInt(val);
  const r=results[gameId];
  await dbSetResult(gameId,r.home??'',r.away??'');
  // re-render tips column only
  const row=document.getElementById('row-'+gameId);
  if(row){const g=GAMES.find(x=>x.id===gameId);if(g){const nr=buildRow(g);nr.id='row-'+gameId;row.replaceWith(nr);}}
}

async function saveTip(playerId,gameId,side,val){
  if(!tips[playerId])tips[playerId]={};
  if(!tips[playerId][gameId])tips[playerId][gameId]={};
  tips[playerId][gameId][side]=val===''?null:parseInt(val);
  const t=tips[playerId][gameId];
  await dbSetTip(playerId,gameId,t.home??'',t.away??'');
}

function openAddPlayer(){
  document.getElementById('newPlayerName').value='';
  document.getElementById('playerModal').classList.add('open');
  setTimeout(()=>document.getElementById('newPlayerName').focus(),100);
}

async function addPlayer(){
  const name=document.getElementById('newPlayerName').value.trim();
  if(!name)return;
  const color=PLAYER_COLORS[players.length%PLAYER_COLORS.length];
  const p=await dbAddPlayer(name,color);
  players.push(p);
  activePlayer=p.id;
  localStorage.setItem('wm2026_active',p.id);
  closeModal('playerModal');
  render();
  showToast(`${name} ist dabei! рЯОЙ`);
}

async function removePlayer(id,e){
  e.stopPropagation();
  if(!confirm('Person entfernen?'))return;
  await dbDeletePlayer(id);
  players=players.filter(p=>p.id!==id);
  delete tips[id];
  if(activePlayer===id){activePlayer=null;localStorage.removeItem('wm2026_active');}
  render();
}

function openScoreboard(){
  const sorted=[...players].map(p=>({...p,pts:totalPoints(p.id)})).sort((a,b)=>b.pts-a.pts);
  let html='';
  if(!sorted.length){html='<p style="color:var(--muted);font-size:13px">Noch niemand dabei.</p>';}
  else{
    html='<table class="sb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th><th title="Exakt">3P</th><th title="Differenz">2P</th><th title="Tendenz">1P</th></tr></thead><tbody>';
    sorted.forEach((p,i)=>{
      let e3=0,e2=0,e1=0;
      GAMES.forEach(g=>{const pts=calcPoints(g.id,p.id);if(pts===3)e3++;else if(pts===2)e2++;else if(pts===1)e1++;});
      html+=`<tr>
        <td style="${i===0?'color:var(--gold);font-weight:700':''}">${i+1}.</td>
        <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px;vertical-align:middle"></span>${p.name}</td>
        <td style="font-weight:700;color:${i===0?'var(--gold)':'var(--text)'}">${p.pts}</td>
        <td style="color:var(--gold)">${e3}</td>
        <td style="color:var(--green)">${e2}</td>
        <td style="color:#5b8dee">${e1}</td>
      </tr>`;
    });
    html+='</tbody></table>';
  }
  document.getElementById('scoreboardContent').innerHTML=html;
  document.getElementById('scoreboardModal').classList.add('open');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('playerModal').classList.contains('open'))addPlayer();
  if(e.key==='Escape'){closeModal('playerModal');closeModal('scoreboardModal');}
});
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});
});

// Auto-refresh alle 30 Sekunden
setInterval(()=>loadAll(),30000);

// Start
loadAll();
</script>
