  header{position:relative;z-index:1;background:linear-gradient(135deg,#1a0a1e 0%,#3d0050 50%,#1a0a1e 100%);border-bottom:2px solid var(--accent);padding:16px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .header-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;text-shadow:0 0 30px rgba(255,45,138,.6);}
  .header-title span{color:var(--accent);}
  .header-meta{color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
  .sync-indicator{font-size:10px;color:var(--muted);}
  .sync-indicator.syncing{color:var(--accent);}
  .sync-indicator.ok{color:var(--green);}

  .players-bar{position:relative;z-index:1;background:rgba(38,13,46,.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .players-bar label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
  .player-chip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;transition:all .2s;}
  .player-chip.active{border-color:var(--accent);background:rgba(255,45,138,.15);box-shadow:0 0 12px rgba(255,45,138,.3);}
  .player-chip .dot{width:8px;height:8px;border-radius:50%;}
  .player-chip .remove{color:var(--muted);margin-left:4px;font-size:11px;cursor:pointer;}
  .add-player{background:none;border:1px dashed var(--border);border-radius:20px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
  .add-player:hover{border-color:var(--accent);color:var(--text);}
  .scoreboard-btn{margin-left:auto;background:linear-gradient(135deg,var(--accent),#c0006a);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 0 15px rgba(255,45,138,.4);}

  main{padding:16px;position:relative;z-index:1;}
  .phase-header{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--accent2);margin:20px 0 8px;display:flex;align-items:center;gap:8px;}
  .phase-header::before{content:'рҹ§ҡвҖҚвҷҖпёҸ';}
  .phase-header::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
  .games-grid{display:grid;gap:8px;}
  .ko-note{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:11px;margin-bottom:6px;}

  /* GAME CARD вҖ“ mobile-first vertical layout */
  .game-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;}
  .game-card:hover{border-color:var(--accent);}
  .germany-card{border-color:#ff6eb4;background:rgba(255,110,180,.05);}

  /* Top row: date + teams + score + TV */
  .card-top{display:grid;grid-template-columns:70px 1fr auto 1fr 70px;align-items:center;gap:0;border-bottom:1px solid var(--border);}

  .card-date{padding:10px 8px;text-align:center;border-right:1px solid var(--border);}
  .card-date .day{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .card-date .time{font-weight:700;font-size:14px;}

  .card-team{padding:10px 10px;display:flex;align-items:center;gap:6px;}
  .card-team.right{flex-direction:row-reverse;}
  .team-flag{font-size:20px;flex-shrink:0;}
  .team-input{background:none;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;width:100%;outline:none;border-bottom:1px dashed transparent;padding:1px 2px;}
  .team-input:focus{border-bottom-color:var(--accent);}
  .team-input::placeholder{color:var(--muted);}

  .card-score{padding:8px 6px;border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:2px;}
  .score-row{display:flex;align-items:center;gap:3px;}
  .score-input{width:28px;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-weight:700;text-align:center;outline:none;font-family:'Inter',sans-serif;}
  .score-input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(255,45,138,.3);}
  .score-sep{color:var(--muted);font-weight:700;font-size:13px;}
  .score-label{font-size:8px;color:var(--muted);text-align:center;}

  .card-tv{padding:6px 8px;text-align:center;border-left:1px solid var(--border);}
  .tv-badge{font-size:8px;font-weight:700;padding:2px 4px;border-radius:3px;letter-spacing:.03em;text-transform:uppercase;display:block;margin-bottom:2px;}
  .tv-ard{background:var(--ard);color:#fff;}
  .tv-zdf{background:var(--zdf);color:#fff;}
  .tv-magenta{background:var(--magenta);color:#fff;}
  .tv-open{background:var(--open);color:#ffe6f5;}
  .tv-sub{font-size:8px;color:var(--muted);display:block;}
  .tv-confirmed{color:var(--green);}

  /* Tips section вҖ“ full width below */
  .card-tips{padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
  .card-tips-empty{padding:8px 12px;color:var(--muted);font-size:11px;text-align:center;}

  .tip-row{display:flex;align-items:center;gap:8px;}
  .tip-player{display:flex;align-items:center;gap:5px;min-width:80px;}
  .tip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .tip-name{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;}
  .tip-inputs{display:flex;align-items:center;gap:3px;}
  .tip-input{width:32px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-weight:600;text-align:center;outline:none;font-family:'Inter',sans-serif;}
  .tip-input:focus{border-color:var(--gold);box-shadow:0 0 6px rgba(255,179,217,.3);}
  .tip-sep{color:var(--muted);font-size:12px;}
  .tip-pts{font-size:11px;font-weight:700;margin-left:4px;}
  .pts3{color:#ffb3d9;}
  .pts2{color:var(--green);}
  .pts1{color:#b3d9ff;}
  .pts0{color:var(--muted);}
  .tip-active{background:rgba(255,45,138,.08);}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,0,15,.85);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:24px;width:340px;max-width:95vw;box-shadow:0 0 40px rgba(255,45,138,.3);}

  .modal input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}

  .modal-btns{display:flex;gap:8px;justify-content:flex-end;}
  .btn{background:linear-gradient(135deg,var(--accent),#c0006a);border:none;border-radius:20px;padding:9px 18px;color:#fff;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}

  .sb-table{width:100%;border-collapse:collapse;margin-top:10px;}
  .sb-table th{text-align:left;padding:7px 8px;font-size:10px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
  .sb-table td{padding:9px 8px;border-bottom:1px solid var(--border);font-size:13px;}
  .sb-table tr:last-child td{border-bottom:none;}

  .legend{display:flex;gap:10px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--border);margin-top:16px;position:relative;z-index:1;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
  .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

  .toast{position:fixed;bottom:20px;right:16px;background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:10px 14px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 0 20px rgba(255,45,138,.3);}
  .toast.show{opacity:1;}
</style>

let players=[],results={},tips={};
let activePlayer=localStorage.getItem('wm2026_active')||null;
let gameOverrides=JSON.parse(localStorage.getItem('wm2026_overrides')||'{}');

function setSyncing(s){const el=document.getElementById('syncIndicator');if(s==='syncing'){el.textContent='в—Ҹ speichertвҖҰ';el.className='sync-indicator syncing';}else{el.textContent='в—Ҹ live';el.className='sync-indicator ok';setTimeout(()=>{el.className='sync-indicator';},2000);}}

async function loadAll(){
  try{
    const [pr,rr,tr]=await Promise.all([api.get('/wm_players?order=created_at'),api.get('/wm_results'),api.get('/wm_tips')]);
    players=pr.data||[];
    results={};(rr.data||[]).forEach(r=>{results[r.game_id]={home:r.home_score,away:r.away_score};});
    tips={};(tr.data||[]).forEach(t=>{if(!tips[t.player_id])tips[t.player_id]={};tips[t.player_id][t.game_id]={home:t.home_score,away:t.away_score};});
    render();
  }catch(e){showToast('Verbindungsfehler');}
}

async function dbAddPlayer(name,color){setSyncing('syncing');const r=await api.post('/wm_players',{name,color},{headers:{'Prefer':'return=representation'}});setSyncing('ok');return r.data[0];}
async function dbDeletePlayer(id){setSyncing('syncing');await api.delete('/wm_players?id=eq.'+id);setSyncing('ok');}
async function dbSetResult(gid,home,away){setSyncing('syncing');await api.post('/wm_results',{game_id:gid,home_score:home===''?null:parseInt(home),away_score:away===''?null:parseInt(away)},{headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}});setSyncing('ok');}
async function dbSetTip(pid,gid,home,away){setSyncing('syncing');await api.post('/wm_tips',{player_id:pid,game_id:gid,home_score:home===''||home===undefined?null:parseInt(home),away_score:away===''||away===undefined?null:parseInt(away)},{headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}});setSyncing('ok');}

function calcPoints(gid,pid){
  const r=results[gid],t=(tips[pid]||{})[gid];
  if(!r||r.home===null||r.home===undefined)return null;
  if(!t||t.home===null||t.home===undefined)return null;
  const rh=parseInt(r.home),ra=parseInt(r.away),th=parseInt(t.home),ta=parseInt(t.away);
  if(isNaN(rh)||isNaN(ra)||isNaN(th)||isNaN(ta))return null;
  if(rh===th&&ra===ta)return 3;
  if((rh-ra)===(th-ta))return 2;
  if((rh>ra)===(th>ta)&&rh!==ra&&th!==ta)return 1;
  if(rh===ra&&th===ta)return 1;
  return 0;
}
function totalPoints(pid){return GAMES.reduce((s,g)=>s+(calcPoints(g.id,pid)||0),0);}

function render(){renderPlayers();renderGames();}

function renderPlayers(){
  const c=document.getElementById('playerChips');c.innerHTML='';
  players.forEach(p=>{
    const chip=document.createElement('div');
    chip.className='player-chip'+(activePlayer===p.id?' active':'');
    chip.innerHTML=`<div class="dot" style="background:${p.color}"></div><span>${p.name}</span><span class="remove" onclick="removePlayer('${p.id}',event)">вң•</span>`;
    chip.onclick=(e)=>{if(!e.target.classList.contains('remove'))setActive(p.id);};
    c.appendChild(chip);
  });
}

function renderGames(){
  const main=document.getElementById('mainContent');main.innerHTML='';
  PHASES.forEach(ph=>{
    const games=GAMES.filter(g=>g.phase===ph.id);if(!games.length)return;
    const hdr=document.createElement('div');hdr.className='phase-header';hdr.textContent=ph.label;main.appendChild(hdr);
    if(['sechzehntel','achtel','viertel'].includes(ph.id)){
      const note=document.createElement('div');note.className='ko-note';
      note.textContent='вңЁ Paarungen stehen nach der Gruppenphase fest вҖ“ Teamnamen direkt editierbar.';main.appendChild(note);
    }
    const grid=document.createElement('div');grid.className='games-grid';
    games.forEach(g=>grid.appendChild(buildCard(g)));main.appendChild(grid);
  });
}

function buildCard(game){
  const ovr=gameOverrides[game.id]||{};
  const homeName=ovr.home||game.home,awayName=ovr.away||game.away;
  const result=results[game.id]||{};
  const tvMap={ard:['ARD','tv-ard'],zdf:['ZDF','tv-zdf'],magenta:['Magenta','tv-magenta'],open:['?','tv-open']};
  const [tvLabel,tvClass]=tvMap[game.tv.s]||['?','tv-open'];
  const tvSub=game.tv.s==='open'?'offen':game.tv.c?'вң“ best.':'wahrsch.';
  const tvSubClass=game.tv.c&&game.tv.s!=='open'?'tv-confirmed':'';

  const card=document.createElement('div');
  card.className='game-card'+(game.de?' germany-card':'');
  card.id='card-'+game.id;

  // TOP ROW
  const top=document.createElement('div');
  top.className='card-top';

  // Date
  const dateDiv=document.createElement('div');dateDiv.className='card-date';
  dateDiv.innerHTML=`<div class="day">${game.date}</div><div class="time">${game.time}</div>`;
  top.appendChild(dateDiv);

  // Home team
  const homeDiv=document.createElement('div');homeDiv.className='card-team';
  homeDiv.innerHTML=`<span class="team-flag">${flag(homeName)}</span><input class="team-input" value="${homeName}" placeholder="Heim" onchange="overrideName('${game.id}','home',this.value)">`;
  top.appendChild(homeDiv);

  // Score (Ergebnis)
  const scoreDiv=document.createElement('div');scoreDiv.className='card-score';
  scoreDiv.innerHTML=`
    <div class="score-row">
      <input class="score-input" type="text" inputmode="numeric" pattern="[0-9]*" value="${result.home??''}" placeholder="-" oninput="saveResult('${game.id}','home',this.value)">
      <span class="score-sep">:</span>
      <input class="score-input" type="text" inputmode="numeric" pattern="[0-9]*" value="${result.away??''}" placeholder="-" oninput="saveResult('${game.id}','away',this.value)">
    </div>
    <div class="score-label">Ergebnis</div>`;
  top.appendChild(scoreDiv);

  // Away team
  const awayDiv=document.createElement('div');awayDiv.className='card-team right';
  awayDiv.innerHTML=`<input class="team-input" value="${awayName}" placeholder="AuswГӨrts" onchange="overrideName('${game.id}','away',this.value)" style="text-align:right"><span class="team-flag">${flag(awayName)}</span>`;
  top.appendChild(awayDiv);

  // TV
  const tvDiv=document.createElement('div');tvDiv.className='card-tv';
  tvDiv.innerHTML=`<span class="tv-badge ${tvClass}">${tvLabel}</span><span class="tv-sub ${tvSubClass}">${tvSub}</span>`;
  top.appendChild(tvDiv);

  card.appendChild(top);

  // TIPS SECTION
  if(players.length===0){
    const empty=document.createElement('div');empty.className='card-tips-empty';
    empty.textContent='рҹ§ҡвҖҚвҷҖпёҸ Auf Mitmachen klicken um zu tippen';
    card.appendChild(empty);
  } else {
    const tipsDiv=document.createElement('div');tipsDiv.className='card-tips';
    players.forEach(p=>{
      const t=(tips[p.id]||{})[game.id]||{};
      const pts=calcPoints(game.id,p.id);
      const ptsHtml=pts!==null?`<span class="tip-pts ${pts===3?'pts3':pts===2?'pts2':pts===1?'pts1':'pts0'}">${pts}P</span>`:'';
      
      const tr=document.createElement('div');
      tr.className='tip-row'+(activePlayer===p.id?' tip-active':'');
      
      tr.innerHTML=`
        <div class="tip-player">
          <div class="tip-dot" style="background:${p.color}"></div>
          <span class="tip-name">${p.name}</span>
        </div>
        <div class="tip-inputs">
          <input class="tip-input" type="text" inputmode="numeric" pattern="[0-9]*" value="${t.home??''}" placeholder="-"
            oninput="saveTip('${p.id}','${game.id}','home',this.value)"
            >
          <span class="tip-sep">:</span>
          <input class="tip-input" type="text" inputmode="numeric" pattern="[0-9]*" value="${t.away??''}" placeholder="-"
            oninput="saveTip('${p.id}','${game.id}','away',this.value)"
            >
        </div>
        ${ptsHtml}`;
      tipsDiv.appendChild(tr);
    });
    card.appendChild(tipsDiv);
  }
  return card;
}

function setActive(pid){activePlayer=activePlayer===pid?null:pid;localStorage.setItem('wm2026_active',activePlayer||'');render();}
function overrideName(gid,side,val){if(!gameOverrides[gid])gameOverrides[gid]={};gameOverrides[gid][side]=val;localStorage.setItem('wm2026_overrides',JSON.stringify(gameOverrides));}

async function saveResult(gid,side,val){
  if(!results[gid])results[gid]={};
  results[gid][side]=val===''?null:parseInt(val);
  await dbSetResult(gid,results[gid].home??'',results[gid].away??'');
  const card=document.getElementById('card-'+gid);
  if(card){const g=GAMES.find(x=>x.id===gid);if(g){const nc=buildCard(g);nc.id='card-'+gid;card.replaceWith(nc);}}
}

async function saveTip(pid,gid,side,val){
  if(!tips[pid])tips[pid]={};if(!tips[pid][gid])tips[pid][gid]={};
  tips[pid][gid][side]=val===''?null:parseInt(val);
  await dbSetTip(pid,gid,tips[pid][gid].home??'',tips[pid][gid].away??'');
}

function openAddPlayer(){document.getElementById('newPlayerName').value='';document.getElementById('playerModal').classList.add('open');setTimeout(()=>document.getElementById('newPlayerName').focus(),100);}
async function addPlayer(){
  const name=document.getElementById('newPlayerName').value.trim();if(!name)return;
  const color=COLORS[players.length%COLORS.length];
  const p=await dbAddPlayer(name,color);
  players.push(p);activePlayer=p.id;localStorage.setItem('wm2026_active',p.id);
  closeModal('playerModal');render();showToast('рҹ§ҡвҖҚвҷҖпёҸ '+name+' ist dabei!');
}
async function removePlayer(id,e){
  e.stopPropagation();if(!confirm('Person entfernen?'))return;
  await dbDeletePlayer(id);players=players.filter(p=>p.id!==id);delete tips[id];
  if(activePlayer===id){activePlayer=null;localStorage.removeItem('wm2026_active');}render();
}

function openScoreboard(){
  const sorted=[...players].map(p=>({...p,pts:totalPoints(p.id)})).sort((a,b)=>b.pts-a.pts);
  let html='';
  if(!sorted.length){html='<p style="color:var(--muted);font-size:13px">Noch niemand dabei рҹ§ҡвҖҚвҷҖпёҸ</p>';}
  else{
    html='<table class="sb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th><th>вңЁ3P</th><th>рҹҢё2P</th><th>рҹ’«1P</th></tr></thead><tbody>';
    sorted.forEach((p,i)=>{
      let e3=0,e2=0,e1=0;
      GAMES.forEach(g=>{const pts=calcPoints(g.id,p.id);if(pts===3)e3++;else if(pts===2)e2++;else if(pts===1)e1++;});
      html+=`<tr><td style="${i===0?'color:#ffb3d9;font-weight:700':''}">${i===0?'рҹ‘‘':i+1+'.'}</td><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px;vertical-align:middle"></span>${p.name}</td><td style="font-weight:700;color:${i===0?'#ffb3d9':'var(--text)'}">${p.pts}</td><td style="color:#ffb3d9">${e3}</td><td style="color:#b8f0c0">${e2}</td><td style="color:#b3d9ff">${e1}</td></tr>`;
    });
    html+='</tbody></table>';
  }
  document.getElementById('scoreboardContent').innerHTML=html;
  document.getElementById('scoreboardModal').classList.add('open');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('playerModal').classList.contains('open'))addPlayer();if(e.key==='Escape'){closeModal('playerModal');closeModal('scoreboardModal');}});
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});
