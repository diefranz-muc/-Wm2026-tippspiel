<html lang="de">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 2026 ✨ Tippspiel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
  :root {
    --bg:#1a0a1e;
    --surface:#260d2e;
    --surface2:#320d3a;
    --border:#5a1a6a;
    --accent:#ff2d8a;
    --accent2:#ff6eb4;
    --gold:#ffb3d9;
    --text:#ffe6f5;
    --muted:#c084a0;
    --green:#b8f0c0;
    --ard:#003f8a;
    --zdf:#e2001a;
    --magenta:#e20074;
    --open:#7a4a8a;
    --glow: 0 0 20px rgba(255,45,138,0.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;background-image:radial-gradient(ellipse at 20% 20%, rgba(255,45,138,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(180,0,255,0.08) 0%, transparent 60%);}

  /* Floating fairies */
  .fairy{position:fixed;pointer-events:none;font-size:20px;animation:float linear infinite;opacity:0.6;z-index:0;}
  @keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:0.6;}90%{opacity:0.6;}100%{transform:translateY(-100px) rotate(360deg);opacity:0;}}

  header{position:relative;z-index:1;background:linear-gradient(135deg,#1a0a1e 0%,#3d0050 50%,#1a0a1e 100%);border-bottom:2px solid var(--accent);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:var(--glow);}
  .header-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;letter-spacing:.02em;line-height:1;text-shadow:0 0 30px rgba(255,45,138,0.6);}
  .header-title span{color:var(--accent);text-shadow:0 0 20px var(--accent);}
  .header-emoji{font-size:1.8rem;animation:sparkle 2s ease-in-out infinite;}
  @keyframes sparkle{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.2) rotate(10deg);}}
  .header-meta{color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:4px;}

  .players-bar{position:relative;z-index:1;background:rgba(38,13,46,0.95);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;backdrop-filter:blur(10px);}
  .players-bar label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
  .player-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;transition:all .2s;}
  .player-chip:hover{border-color:var(--accent);box-shadow:0 0 10px rgba(255,45,138,0.2);}
  .player-chip.active{border-color:var(--accent);background:rgba(255,45,138,0.15);box-shadow:0 0 12px rgba(255,45,138,0.3);}
  .player-chip .dot{width:8px;height:8px;border-radius:50%;}
  .player-chip .remove{color:var(--muted);margin-left:4px;font-size:11px;cursor:pointer;}
  .player-chip .remove:hover{color:var(--accent);}
  .add-player{background:none;border:1px dashed var(--border);border-radius:20px;padding:4px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
  .add-player:hover{border-color:var(--accent);color:var(--text);box-shadow:0 0 10px rgba(255,45,138,0.2);}
  .scoreboard-btn{margin-left:auto;background:linear-gradient(135deg,var(--accent),#c0006a);border:none;border-radius:20px;padding:6px 16px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 0 15px rgba(255,45,138,0.4);transition:all .2s;}
  .scoreboard-btn:hover{box-shadow:0 0 25px rgba(255,45,138,0.6);transform:translateY(-1px);}

  main{padding:20px 28px;max-width:1300px;position:relative;z-index:1;}
  .phase-header{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--accent2);margin:24px 0 10px;display:flex;align-items:center;gap:10px;}
  .phase-header::before{content:'🧚‍♀️';}
  .phase-header::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
  .games-grid{display:grid;gap:6px;}

  .game-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;display:grid;grid-template-columns:88px 1fr 110px 1fr 88px 1fr;align-items:stretch;overflow:hidden;transition:all .2s;}
  .game-row:hover{border-color:var(--accent);box-shadow:0 0 15px rgba(255,45,138,0.1);}
  .germany-row{border-color:#ff6eb4;background:rgba(255,110,180,0.06);}
  .germany-row:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(255,45,138,0.2);}

  .game-date{padding:10px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
  .game-date .day{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .game-date .time{font-weight:700;font-size:15px;color:var(--text);}

  .team{padding:8px 12px;display:flex;align-items:center;gap:8px;}
  .team.right{flex-direction:row-reverse;text-align:right;}
  .team-flag{font-size:18px;flex-shrink:0;}
  .team-name-input{background:none;border:none;border-bottom:1px dashed transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;width:100%;padding:2px 4px;outline:none;}
  .team-name-input:focus{border-bottom-color:var(--accent);}
  .team-name-input::placeholder{color:var(--muted);}

  .score-block{padding:8px;border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .score-inputs{display:flex;align-items:center;gap:4px;}
  .score-input{width:30px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-weight:700;text-align:center;outline:none;font-family:'Inter',sans-serif;}
  .score-input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(255,45,138,0.3);}
  .score-sep{color:var(--muted);font-weight:700;}
  .score-label{font-size:9px;color:var(--muted);}

  .tv-cell{padding:6px 8px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;}
  .tv-badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
  .tv-ard{background:var(--ard);color:#fff;}
  .tv-zdf{background:var(--zdf);color:#fff;}
  .tv-magenta{background:var(--magenta);color:#fff;}
  .tv-open{background:var(--open);color:#ffe6f5;font-style:italic;}
  .tv-confirmed{font-size:8px;color:var(--green);}
  .tv-unconfirmed{font-size:8px;color:var(--muted);}

  .tips-cell{padding:6px 10px;display:flex;flex-direction:column;gap:5px;justify-content:center;}
  .tip-row{display:flex;align-items:center;gap:6px;}
  .tip-player-info{display:flex;align-items:center;gap:4px;min-width:72px;}
  .tip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .tip-name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62px;}
  .tip-inputs{display:flex;align-items:center;gap:3px;}
  .tip-input{width:24px;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:12px;font-weight:600;text-align:center;outline:none;font-family:'Inter',sans-serif;}
  .tip-input:focus{border-color:var(--gold);box-shadow:0 0 6px rgba(255,179,217,0.3);}
  .tip-sep{color:var(--muted);font-size:11px;}
  .tip-pts{font-size:10px;font-weight:700;min-width:18px;text-align:right;}
  .pts3{color:#ffb3d9;text-shadow:0 0 8px rgba(255,179,217,0.6);}
  .pts2{color:var(--green);}
  .pts1{color:#b3d9ff;}
  .pts0{color:var(--muted);}

  .ko-note{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:12px;margin-bottom:6px;}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,0,15,0.85);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:24px;width:360px;max-width:95vw;box-shadow:0 0 40px rgba(255,45,138,0.3);}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:14px;color:var(--accent2);}
  .modal input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
  .modal input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(255,45,138,0.2);}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
  .btn{background:linear-gradient(135deg,var(--accent),#c0006a);border:none;border-radius:20px;padding:8px 18px;color:#fff;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;box-shadow:0 0 12px rgba(255,45,138,0.3);}
  .btn:hover{box-shadow:0 0 20px rgba(255,45,138,0.5);transform:translateY(-1px);}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);box-shadow:none;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--text);transform:none;}

  .sb-table{width:100%;border-collapse:collapse;margin-top:10px;}
  .sb-table th{text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);}
  .sb-table td{padding:9px 10px;border-bottom:1px solid var(--border);}
  .sb-table tr:last-child td{border-bottom:none;}

  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px 28px;border-top:1px solid var(--border);margin-top:20px;position:relative;z-index:1;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:2px;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:10px 16px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 0 20px rgba(255,45,138,0.3);}
  .toast.show{opacity:1;}

  .sync-indicator{font-size:10px;color:var(--muted);margin-left:auto;padding-right:4px;}
  .sync-indicator.syncing{color:var(--accent);}
  .sync-indicator.ok{color:var(--green);}

let players=[],results={},tips={};
let activePlayer=localStorage.getItem('wm2026_active')||null;
let gameOverrides=JSON.parse(localStorage.getItem('wm2026_overrides')||'{}');

function setSyncing(s){const el=document.getElementById('syncIndicator');if(s==='syncing'){el.textContent='● speichert…';el.className='sync-indicator syncing';}else{el.textContent='● live';el.className='sync-indicator ok';setTimeout(()=>{el.className='sync-indicator';},2000);}}

async function loadAll(){
  try{
    const [pr,rr,tr]=await Promise.all([api.get('/wm_players?order=created_at'),api.get('/wm_results'),api.get('/wm_tips')]);
    players=pr.data||[];
    results={};(rr.data||[]).forEach(r=>{results[r.game_id]={home:r.home_score,away:r.away_score};});
    tips={};(tr.data||[]).forEach(t=>{if(!tips[t.player_id])tips[t.player_id]={};tips[t.player_id][t.game_id]={home:t.home_score,away:t.away_score};});
    render();
  }catch(e){showToast('Verbindungsfehler – bitte neu laden');}
}

async function dbAddPlayer(name,color){setSyncing('syncing');const r=await api.post('/wm_players',{name,color},{headers:{'Prefer':'return=representation'}});setSyncing('ok');return r.data[0];}
async function dbDeletePlayer(id){setSyncing('syncing');await api.delete('/wm_players?id=eq.'+id);setSyncing('ok');}
async function dbSetResult(gameId,home,away){setSyncing('syncing');await api.post('/wm_results',{game_id:gameId,home_score:home===''?null:parseInt(home),away_score:away===''?null:parseInt(away)},{headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}});setSyncing('ok');}
async function dbSetTip(pid,gid,home,away){setSyncing('syncing');await api.post('/wm_tips',{player_id:pid,game_id:gid,home_score:home===''||home===undefined?null:parseInt(home),away_score:away===''||away===undefined?null:parseInt(away)},{headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}});setSyncing('ok');}

function calcPoints(gid,pid){
  const r=results[gid],t=(tips[pid]||{})[gid];
  if(!r||r.home===null||r.home===undefined)return null;
  if(!t||t.home===null||t.home===undefined)return null;
  const rh=parseInt(r.home),ra=parseInt(r.away),th=parseInt(t.home),ta=parseInt(t.away);
  if(isNaN(rh)||isNaN(ra)||isNaN(th)||isNaN(ta))return null;
  if(rh===th&&ra===ta)return 3;
  if((rh-ra)===(th-ta))return 2;
  const rt=rh>ra?1:rh<ra?-1:0,tt=th>ta?1:th<ta?-1:0;
  if(rt===tt)return 1;return 0;
}
function totalPoints(pid){return GAMES.reduce((s,g)=>s+(calcPoints(g.id,pid)||0),0);}

function render(){renderPlayers();renderGames();}

function renderPlayers(){
  const c=document.getElementById('playerChips');c.innerHTML='';
  players.forEach(p=>{
    const chip=document.createElement('div');
    chip.className='player-chip'+(activePlayer===p.id?' active':'');
    chip.innerHTML=`<div class="dot" style="background:${p.color}"></div><span>${p.name}</span><span class="remove" onclick="removePlayer('${p.id}',event)">✕</span>`;
    chip.onclick=(e)=>{if(!e.target.classList.contains('remove'))setActive(p.id);};
    c.appendChild(chip);
  });
}

function renderGames(){
  const main=document.getElementById('mainContent');main.innerHTML='';
  PHASES.forEach(ph=>{
    const games=GAMES.filter(g=>g.phase===ph.id);if(!games.length)return;
    const hdr=document.createElement('div');hdr.className='phase-header';hdr.textContent=ph.label;main.appendChild(hdr);
    if(['sechzehntel','achtel','viertel'].includes(ph.id)){const note=document.createElement('div');note.className='ko-note';note.textContent='✨ Paarungen stehen nach der Gruppenphase fest – Teamnamen direkt editierbar.';main.appendChild(note);}
    const grid=document.createElement('div');grid.className='games-grid';
    games.forEach(g=>grid.appendChild(buildRow(g)));main.appendChild(grid);
  });
}

function buildRow(game){
  const ovr=gameOverrides[game.id]||{};
  const homeName=ovr.home||game.home,awayName=ovr.away||game.away;
  const result=results[game.id]||{};
  const tvMap={ard:['ARD','tv-ard'],zdf:['ZDF','tv-zdf'],magenta:['MagentaTV','tv-magenta'],open:['?','tv-open']};
  const [tvLabel,tvClass]=tvMap[game.tv.s]||['?','tv-open'];
  const tvSub=game.tv.s==='open'?'<span class="tv-unconfirmed">noch offen</span>':game.tv.c?'<span class="tv-confirmed">✓ bestätigt</span>':'<span class="tv-unconfirmed">wahrsch.</span>';
  const row=document.createElement('div');
  row.className='game-row'+(game.de?' germany-row':'');
  row.id='row-'+game.id;
  row.style.gridTemplateColumns='88px 1fr 110px 1fr 88px 1fr';
  const dateDiv=document.createElement('div');dateDiv.className='game-date';dateDiv.innerHTML=`<div class="day">${game.date}</div><div class="time">${game.time}</div>`;row.appendChild(dateDiv);
  const homeDiv=document.createElement('div');homeDiv.className='team';homeDiv.innerHTML=`<span class="team-flag">${flag(homeName)}</span><input class="team-name-input" value="${homeName}" placeholder="Heimteam" onchange="overrideName('${game.id}','home',this.value)">`;row.appendChild(homeDiv);
  const scoreDiv=document.createElement('div');scoreDiv.className='score-block';scoreDiv.innerHTML=`<div class="score-inputs"><input class="score-input" type="number" min="0" max="99" value="${result.home??''}" placeholder="-" onchange="saveResult('${game.id}','home',this.value)"><span class="score-sep">:</span><input class="score-input" type="number" min="0" max="99" value="${result.away??''}" placeholder="-" onchange="saveResult('${game.id}','away',this.value)"></div><div class="score-label">Ergebnis</div>`;row.appendChild(scoreDiv);
  const awayDiv=document.createElement('div');awayDiv.className='team right';awayDiv.innerHTML=`<input class="team-name-input" value="${awayName}" placeholder="Auswärts" onchange="overrideName('${game.id}','away',this.value)"><span class="team-flag">${flag(awayName)}</span>`;row.appendChild(awayDiv);
  const tvDiv=document.createElement('div');tvDiv.className='tv-cell';tvDiv.innerHTML=`<span class="tv-badge ${tvClass}">${tvLabel}</span>${tvSub}`;row.appendChild(tvDiv);
  const tipsDiv=document.createElement('div');tipsDiv.className='tips-cell';tipsDiv.style.gridColumn='span 1';
  if(players.length===0){tipsDiv.innerHTML='<span style="color:var(--muted);font-size:11px">🧚‍♀️ Mitmachen klicken ↑</span>';}
  else{players.forEach(p=>{const t=(tips[p.id]||{})[game.id]||{};const pts=calcPoints(game.id,p.id);const ptsHtml=pts!==null?`<span class="tip-pts ${pts===3?'pts3':pts===2?'pts2':pts===1?'pts1':'pts0'}">${pts}P</span>`:'';const dim=activePlayer&&activePlayer!==p.id?'opacity:0.35':'';const tr=document.createElement('div');tr.className='tip-row';tr.innerHTML=`<div class="tip-player-info"><div class="tip-dot" style="background:${p.color}"></div><span class="tip-name">${p.name}</span></div><div class="tip-inputs" style="${dim}"><input class="tip-input" type="number" min="0" max="99" value="${t.home??''}" placeholder="-" onchange="saveTip('${p.id}','${game.id}','home',this.value)" onfocus="setActive('${p.id}')"><span class="tip-sep">:</span><input class="tip-input" type="number" min="0" max="99" value="${t.away??''}" placeholder="-" onchange="saveTip('${p.id}','${game.id}','away',this.value)" onfocus="setActive('${p.id}')"></div>${ptsHtml}`;tipsDiv.appendChild(tr);});}
  row.appendChild(tipsDiv);return row;
}

function setActive(pid){activePlayer=activePlayer===pid?null:pid;localStorage.setItem('wm2026_active',activePlayer||'');render();}
function overrideName(gid,side,val){if(!gameOverrides[gid])gameOverrides[gid]={};gameOverrides[gid][side]=val;localStorage.setItem('wm2026_overrides',JSON.stringify(gameOverrides));}
async function saveResult(gid,side,val){if(!results[gid])results[gid]={};results[gid][side]=val===''?null:parseInt(val);const r=results[gid];await dbSetResult(gid,r.home??'',r.away??'');const row=document.getElementById('row-'+gid);if(row){const g=GAMES.find(x=>x.id===gid);if(g){const nr=buildRow(g);nr.id='row-'+gid;row.replaceWith(nr);}}}
async function saveTip(pid,gid,side,val){if(!tips[pid])tips[pid]={};if(!tips[pid][gid])tips[pid][gid]={};tips[pid][gid][side]=val===''?null:parseInt(val);const t=tips[pid][gid];await dbSetTip(pid,gid,t.home??'',t.away??'');}

function openAddPlayer(){document.getElementById('newPlayerName').value='';document.getElementById('playerModal').classList.add('open');setTimeout(()=>document.getElementById('newPlayerName').focus(),100);}
async function addPlayer(){const name=document.getElementById('newPlayerName').value.trim();if(!name)return;const color=PLAYER_COLORS[players.length%PLAYER_COLORS.length];const p=await dbAddPlayer(name,color);players.push(p);activePlayer=p.id;localStorage.setItem('wm2026_active',p.id);closeModal('playerModal');render();showToast('🧚‍♀️ '+name+' ist dabei!');}
async function removePlayer(id,e){e.stopPropagation();if(!confirm('Person entfernen?'))return;await dbDeletePlayer(id);players=players.filter(p=>p.id!==id);delete tips[id];if(activePlayer===id){activePlayer=null;localStorage.removeItem('wm2026_active');}render();}

function openScoreboard(){
  const sorted=[...players].map(p=>({...p,pts:totalPoints(p.id)})).sort((a,b)=>b.pts-a.pts);
  let html='';
  if(!sorted.length){html='<p style="color:var(--muted);font-size:13px">Noch niemand dabei 🧚‍♀️</p>';}
  else{html='<table class="sb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th><th>✨</th><th>🌸</th><th>💫</th></tr></thead><tbody>';sorted.forEach((p,i)=>{let e3=0,e2=0,e1=0;GAMES.forEach(g=>{const pts=calcPoints(g.id,p.id);if(pts===3)e3++;else if(pts===2)e2++;else if(pts===1)e1++;});html+=`<tr><td style="${i===0?'color:#ffb3d9;font-weight:700':''}">${i===0?'👑':i+1+'.'}</td><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px;vertical-align:middle"></span>${p.name}</td><td style="font-weight:700;color:${i===0?'#ffb3d9':'var(--text)'}">${p.pts}</td><td style="color:#ffb3d9">${e3}</td><td style="color:#b8f0c0">${e2}</td><td style="color:#b3d9ff">${e1}</td></tr>`;});html+='</tbody></table>';}
  document.getElementById('scoreboardContent').innerHTML=html;
  document.getElementById('scoreboardModal').classList.add('open');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('playerModal').classList.contains('open'))addPlayer();if(e.key==='Escape'){closeModal('playerModal');closeModal('scoreboardModal');}});
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});

setInterval(()=>loadAll(),30000);
loadAll();
</script>
